name: Bug Report
description: Report a bug in Drift
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill out the details below.
  - type: input
    id: version
    attributes:
      label: Drift version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Ubuntu / Debian
        - Fedora
        - Arch Linux
        - Other Linux
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Drift
        2. Connect to...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Paste relevant logs from `~/Library/Logs/com.drift.app/Drift.log`"
      render: text
